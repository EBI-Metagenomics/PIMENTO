- name: standard_primer_matching test_wrong_args
  tags:
    - standard_primer_matching
  exit_code: 2
  command: pimento std --chromosome X
  stderr:
    contains:
      - "Error: No such option: --chromosome"
- name: standard_primer_matching test_correct_args
  tags:
    - standard_primer_matching
  command: pimento std -i tests/fixtures/test.fastq.gz  --merged -o sample
  files:
    - path: "sample_std_primers.fasta"
      md5sum: f26cdc22a5231d2dbd0831f1f1983dc6

- name: standard_primer_matching test_threads
  tags:
    - standard_primer_matching
  command: pimento std -i tests/fixtures/test.fastq.gz --threads 2 --merged -o sample_threads
  files:
    - path: "sample_threads_std_primers.fasta"
      md5sum: f26cdc22a5231d2dbd0831f1f1983dc6
